<div class="front-content dictation-content">
    <h1 class="cat D">DICTATION</h1>
    <div class="Word">{{单词}}</div>
    <div class="PhoneticSymbol">{{音标}}</div>

    {{#发音}}
    <div class="audio-row">
        <hr class="audio-line POSD" />
        <div class="audio-control">{{发音}}</div>
        <hr class="audio-line POSD" />
    </div>
    {{/发音}}
</div>

<div id="answer" class="back-content dictation-content">
    {{#释义 1}}
    <section class="sense-section sense-one">
        {{#词性 1}}
        <div class="external-pos-row">
            <span class="pos-label POSD">{{词性 1}}</span>
        </div>
        {{/词性 1}}
        <div class="Paraphrase">{{释义 1}}</div>
    </section>
    {{/释义 1}}

    {{#释义 2}}
    <section class="sense-section sense-section-separated">
        {{#词性 2}}
        <div class="external-pos-row">
            <span class="pos-label POSD">{{词性 2}}</span>
        </div>
        {{/词性 2}}
        <div class="Paraphrase">{{释义 2}}</div>
    </section>
    {{/释义 2}}

    {{#例句}}
    <section class="extra-section examples-section">
        <div data-markdown class="En">{{例句}}</div>
        {{#例句翻译}}
        <div data-markdown class="Zh">{{例句翻译}}</div>
        {{/例句翻译}}
    </section>
    {{/例句}}

    {{#词组短语}}
    <section class="extra-section">
        <hr class="section-rule" />
        <div data-markdown class="md">{{词组短语}}</div>
    </section>
    {{/词组短语}}

    {{#拓展}}
    <section class="extra-section">
        <hr class="section-rule" />
        <div data-markdown class="md">{{拓展}}</div>
    </section>
    {{/拓展}}
</div>
